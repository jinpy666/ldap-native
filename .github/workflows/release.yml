name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, for example v0.1.1'
        required: true
        type: string
      ref:
        description: 'Git ref to build from; defaults to the release tag'
        required: false
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || github.event.inputs.release_tag) || github.ref }}

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      - name: Validate release tag matches package version
        run: |
          node <<'NODE'
          const pkg = require('./package.json');
          const releaseTag = process.env.RELEASE_TAG;
          const expectedTag = `v${pkg.version}`;

          if (releaseTag !== expectedTag) {
            console.error(`Release tag ${releaseTag} does not match package.json version ${pkg.version}. Expected ${expectedTag}.`);
            process.exit(1);
          }

          console.log(`Publishing ${pkg.name}@${pkg.version} for ${releaseTag}`);
          NODE

  prebuild-linux-x64:
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y libldap2-dev libsasl2-dev
      - run: npm install
      - run: npm run build
      - name: Stage linux-x64-gnu prebuild artifact
        run: |
          mkdir -p release-prebuilds/linux-x64-gnu
          cp build/Release/ldap_native.node release-prebuilds/linux-x64-gnu/ldap_native.node
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-linux-x64-gnu
          path: release-prebuilds/

  prebuild-macos-x64:
    runs-on: macos-15-intel
    needs: verify-release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: brew update
      - run: brew install openldap cyrus-sasl
      - run: echo "CPPFLAGS=-I$(brew --prefix openldap)/include" >> $GITHUB_ENV
      - run: echo "LDFLAGS=-L$(brew --prefix openldap)/lib" >> $GITHUB_ENV
      - run: npm install
      - run: npm run build
      - name: Stage macos-x64 prebuild artifact
        run: |
          mkdir -p release-prebuilds/darwin-x64
          cp build/Release/ldap_native.node release-prebuilds/darwin-x64/ldap_native.node
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-darwin-x64
          path: release-prebuilds/

  prebuild-macos-arm64:
    runs-on: macos-14
    needs: verify-release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: brew update
      - run: brew install openldap cyrus-sasl
      - run: echo "CPPFLAGS=-I$(brew --prefix openldap)/include" >> $GITHUB_ENV
      - run: echo "LDFLAGS=-L$(brew --prefix openldap)/lib" >> $GITHUB_ENV
      - run: npm install
      - run: npm run build
      - name: Stage darwin-arm64 prebuild artifact
        run: |
          mkdir -p release-prebuilds/darwin-arm64
          cp build/Release/ldap_native.node release-prebuilds/darwin-arm64/ldap_native.node
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-darwin-arm64
          path: release-prebuilds/

  prebuild-windows-x64:
    runs-on: windows-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --ignore-scripts
      - run: npm run build
      - name: Stage win32-x64 prebuild artifact
        run: |
          New-Item -ItemType Directory -Force -Path release-prebuilds/win32-x64 | Out-Null
          Copy-Item build/Release/ldap_native.node release-prebuilds/win32-x64/ldap_native.node
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-win32-x64
          path: release-prebuilds/

  publish:
    runs-on: ubuntu-latest
    needs:
      - prebuild-linux-x64
      - prebuild-macos-x64
      - prebuild-macos-arm64
      - prebuild-windows-x64
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || vars.NPM_TOKEN }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          always-auth: true
      - run: sudo apt-get update && sudo apt-get install -y libldap2-dev libsasl2-dev
      - name: Validate npm auth token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM token is missing. Configure NPM_TOKEN as a GitHub Actions secret or variable."
            exit 1
          fi
          npm whoami --registry=https://registry.npmjs.org/
      - run: npm install
      - uses: actions/download-artifact@v4
        with:
          path: prebuild-downloads
      - name: Assemble prebuilds
        run: |
          rm -rf prebuilds
          mkdir -p prebuilds
          cp -R prebuild-downloads/prebuild-linux-x64-gnu/linux-x64-gnu prebuilds/
          cp -R prebuild-downloads/prebuild-darwin-x64/darwin-x64 prebuilds/
          cp -R prebuild-downloads/prebuild-darwin-arm64/darwin-arm64 prebuilds/
          cp -R prebuild-downloads/prebuild-win32-x64/win32-x64 prebuilds/
          find prebuilds -maxdepth 2 -type f -print
      - run: npm run build:compat
      - run: npm run test:unit
      - run: npm run test:imports
      - run: npm run test:upstream
      - run: npm publish --provenance --access public
      - run: echo "Published ${RELEASE_TAG} to npm with provenance." > RELEASE_NOTES.txt
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: RELEASE_NOTES.txt
