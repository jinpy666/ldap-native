name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      run_gssapi_docker_lab:
        description: Run the self-contained FreeIPA Docker GSSAPI lab on Linux
        required: false
        type: boolean
        default: false

jobs:
  api-compat:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    env:
      LDAP_NATIVE_USE_MOCK: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm install --ignore-scripts
      - run: npm run build:compat
      - run: npm run test:unit
      - run: npm run test:imports
      - run: npm run test:upstream

  native-linux:
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y libldap2-dev libsasl2-dev
      - run: npm install
      - run: npm run smoke
      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-node${{ matrix.node }}
          path: |
            build/Release/ldap_native.node
            prebuilds/**

  integration-docker-linux:
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y libldap2-dev libsasl2-dev
      - run: npm install
      - run: npm run test:full
      - if: failure()
        run: docker compose logs openldap > docker-openldap.log
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-openldap-logs-node${{ matrix.node }}
          path: docker-openldap.log

  native-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            node: 22
          - runner: macos-14
            node: 22
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: brew update
      - run: brew install openldap cyrus-sasl
      - run: echo "CPPFLAGS=-I$(brew --prefix openldap)/include" >> $GITHUB_ENV
      - run: echo "LDFLAGS=-L$(brew --prefix openldap)/lib" >> $GITHUB_ENV
      - run: echo "CXXFLAGS=-fexceptions -frtti" >> $GITHUB_ENV
      - run: npm install
      - run: npm run smoke
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.runner }}
          path: |
            build/Release/ldap_native.node
            prebuilds/**

  native-windows:
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm install --ignore-scripts
      - run: npm run build:native
      - run: npm run smoke
      - uses: actions/upload-artifact@v4
        with:
          name: native-windows-node${{ matrix.node }}
          path: |
            build/Release/ldap_native.node
            prebuilds/**

  gssapi-linux:
    runs-on: ubuntu-latest
    env:
      LDAP_URL: ${{ secrets.LDAP_URL }}
      LDAP_BASE_DN: ${{ secrets.LDAP_BASE_DN }}
      LDAP_CA_FILE: ${{ secrets.LDAP_CA_FILE }}
      LDAP_CA_B64: ${{ secrets.LDAP_CA_B64 }}
      LDAP_STARTTLS: ${{ secrets.LDAP_STARTTLS || '1' }}
      LDAP_GSSAPI: '1'
      KRB5_CONFIG: ${{ secrets.KRB5_CONFIG || '/etc/krb5.conf' }}
      KRB5_CONFIG_B64: ${{ secrets.KRB5_CONFIG_B64 }}
      KRB5CCNAME: FILE:${{ github.workspace }}/artifacts/gssapi/krb5cc
      KRB5_PRINCIPAL: ${{ secrets.KRB5_PRINCIPAL }}
      KRB5_PASSWORD: ${{ secrets.KRB5_PASSWORD }}
      KRB5_KEYTAB_B64: ${{ secrets.KRB5_KEYTAB_B64 }}
      GSSAPI_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/gssapi
    steps:
      - id: gssapi-config
        run: |
          enabled=true
          if [[ -z "${LDAP_URL}" || -z "${LDAP_BASE_DN}" || -z "${KRB5_PRINCIPAL}" ]]; then
            enabled=false
          fi
          if [[ -z "${KRB5_PASSWORD}" && -z "${KRB5_KEYTAB_B64}" ]]; then
            enabled=false
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        if: steps.gssapi-config.outputs.enabled == 'true'
      - uses: actions/setup-node@v4
        if: steps.gssapi-config.outputs.enabled == 'true'
        with:
          node-version: 22
          cache: npm
      - if: steps.gssapi-config.outputs.enabled == 'true'
        run: sudo apt-get update && sudo apt-get install -y libldap2-dev libsasl2-dev libsasl2-modules-gssapi-mit krb5-user ldap-utils tshark
      - if: steps.gssapi-config.outputs.enabled == 'true'
        run: npm install
      - if: steps.gssapi-config.outputs.enabled == 'true'
        run: chmod +x scripts/verify-gssapi-rhel9.sh scripts/run-gssapi-ci.sh
      - if: steps.gssapi-config.outputs.enabled == 'true'
        run: bash scripts/run-gssapi-ci.sh
      - if: steps.gssapi-config.outputs.enabled != 'true'
        run: echo "Skipping gssapi-linux because required secrets are not configured."
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gssapi-linux-artifacts
          path: artifacts/gssapi/

  gssapi-windows:
    runs-on: windows-latest
    env:
      LDAP_URL: ${{ secrets.LDAP_URL }}
      LDAP_BASE_DN: ${{ secrets.LDAP_BASE_DN }}
      LDAP_STARTTLS: ${{ secrets.LDAP_STARTTLS || '1' }}
      LDAP_GSSAPI_USER: ${{ secrets.LDAP_GSSAPI_WINDOWS_USER }}
      LDAP_GSSAPI_PASSWORD: ${{ secrets.LDAP_GSSAPI_WINDOWS_PASSWORD }}
      LDAP_GSSAPI_DOMAIN: ${{ secrets.LDAP_GSSAPI_WINDOWS_DOMAIN }}
      LDAP_GSSAPI_REALM: ${{ secrets.LDAP_GSSAPI_WINDOWS_REALM }}
      GSSAPI_WINDOWS_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/gssapi-windows
    steps:
      - id: gssapi-windows-config
        shell: pwsh
        run: |
          $enabled = 'true'
          if ([string]::IsNullOrWhiteSpace($env:LDAP_URL) -or [string]::IsNullOrWhiteSpace($env:LDAP_BASE_DN)) {
            $enabled = 'false'
          }
          if ([string]::IsNullOrWhiteSpace($env:LDAP_GSSAPI_USER) -or [string]::IsNullOrWhiteSpace($env:LDAP_GSSAPI_PASSWORD)) {
            $enabled = 'false'
          }
          "enabled=$enabled" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - uses: actions/checkout@v4
        if: steps.gssapi-windows-config.outputs.enabled == 'true'
      - uses: actions/setup-node@v4
        if: steps.gssapi-windows-config.outputs.enabled == 'true'
        with:
          node-version: 22
          cache: npm
      - if: steps.gssapi-windows-config.outputs.enabled == 'true'
        run: npm install --ignore-scripts
      - if: steps.gssapi-windows-config.outputs.enabled == 'true'
        run: npm run build:native
      - if: steps.gssapi-windows-config.outputs.enabled == 'true'
        shell: pwsh
        run: ./scripts/verify-gssapi-windows.ps1
      - if: steps.gssapi-windows-config.outputs.enabled != 'true'
        shell: pwsh
        run: Write-Host 'Skipping gssapi-windows because required secrets are not configured.'
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gssapi-windows-artifacts
          path: artifacts/gssapi-windows/

  gssapi-docker-lab-linux:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gssapi_docker_lab }}
    runs-on: ubuntu-latest
    env:
      GSSAPI_DOCKER_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/gssapi-docker
    steps:
      - uses: actions/checkout@v4
      - name: Configure Docker userns-remap for FreeIPA
        run: |
          echo -e "dockremap:$(id -u):1\ndockremap:200001:65535" | sudo tee -a /etc/subuid
          echo -e "dockremap:$(id -g):1\ndockremap:200001:65535" | sudo tee -a /etc/subgid
          echo '{ "userns-remap": "default" }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: chmod +x scripts/verify-gssapi-rhel9.sh scripts/run-gssapi-docker-lab.sh
      - run: bash scripts/run-gssapi-docker-lab.sh
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gssapi-docker-lab-artifacts
          path: artifacts/gssapi-docker/
